<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Reservation</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="logo">Serene Stay Hotel</div>
  <nav>
    <ul class="nav-menu">
      <li><a href="home-page.html">Home</a></li>
      <li><a href="bookings.html">Bookings</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </nav>
</header>

<section class="inner-hero">
  <div class="inner-hero-inner">
    <span class="eyebrow">Reservation</span>
    <h1>Complete Your Booking</h1>
    <p>Fill in your details below and we'll confirm your reservation.</p>
  </div>
</section>

<main class="section">
  <div class="section-inner narrow">
    <div class="page-container">
      <form class="res-form" onsubmit="return submitReservation(event)">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" required>

        <label for="checkin">Check-in Date</label>
        <input type="date" id="checkin" name="checkin" required>

        <label for="checkout">Check-out Date</label>
        <input type="date" id="checkout" name="checkout" required>

        <label for="guests">Number of Guests</label>
        <input type="number" id="guests" name="guests" min="1" required>

        <label for="roomType">Room Type</label>
        <select id="roomType" name="roomType" required>
          <option value="">-- Select a room type --</option>
          <option value="standard">Standard Room</option>
          <option value="deluxe">Deluxe Room</option>
          <option value="suite">Suite</option>
          <option value="family">Family Room</option>
        </select>

        <label for="requests">Special Requests (optional)</label>
        <textarea id="requests" name="requests" placeholder="e.g. Late check-in, extra pillows..."></textarea>

        <button type="submit">Book Now</button>
      </form>
    </div>
  </div>
</main>

<footer>
  <p>&copy; 2026 Serene Stay Hotel. All rights reserved.</p>
</footer>

<script>
function submitReservation(event) {
  event.preventDefault();
  alert("Thank you! Your reservation request has been submitted.");
  event.target.reset();
  return false;
}
</script>

</body>
</html>
